name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: docintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Settings() requires these two at import time — dummy values are fine,
      # nothing in the test suite talks to a real "docintel" database (pytest
      # runs against docintel_test via TEST_DATABASE_URL below).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docintel
      SECRET_KEY: ci-test-secret-key-not-for-production
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docintel_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      # Configure this under Settings → Secrets and variables → Actions in the
      # GitHub repo. Not required for the pytest suite to pass (chat_service.py
      # falls back to an empty string), only needed if a test starts exercising
      # real Groq calls.
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng \
            libpoppler-cpp-dev poppler-utils \
            postgresql-client

      - name: Install CPU-only PyTorch
        # Mirrors the Dockerfile: pins the CPU wheel before requirements.txt
        # pulls in torch, avoiding a multi-GB default CUDA download.
        run: |
          pip install --no-cache-dir torch==2.10.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE docintel_test;"

      - name: Enable pgvector extension on the test database
        # conftest.py's client fixture deliberately never triggers FastAPI's
        # startup lifespan (that's where CREATE EXTENSION vector normally runs
        # for the main app database, in app/main.py), so docintel_test needs
        # it enabled explicitly before pytest creates any Vector columns.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d docintel_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run pytest
        run: pytest tests/ -v

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # Playwright's e2e suite needs the full stack (Postgres + Redis + Celery
      # worker + a live backend + a live frontend dev server) running
      # simultaneously — wiring that up reliably in Actions is a follow-up,
      # not a build-verification step. Skipped here on purpose; run
      # `npm run test:e2e` locally against the running app instead.
